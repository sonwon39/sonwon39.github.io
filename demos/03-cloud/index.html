<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        if (!t)
          t = matchMedia('(prefers-color-scheme: light)').matches
            ? 'light'
            : 'dark';
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <title>03. cloud</title>
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      /* 이 데모는 노이즈를 여러 개 나열하므로 본문 폭을 넓게 쓴다
         (사이트 공통 .container의 max-width: 860px을 이 페이지에서만 덮어씀) */
      .container {
        max-width: 1120px;
      }
      /* 노이즈 종류별 캔버스를 격자로 배치.
         최소 230px 열을 폭에 들어가는 만큼 자동 생성 → 창 크기에 따라 1~4열 */
      .noise-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 1.4rem;
      }
      .noise-grid figure {
        margin: 0;
      }
      .noise-grid canvas {
        display: block;
        width: 100%;
        aspect-ratio: 1 / 1; /* 표시 영역을 정사각형으로 고정 */
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #000;
      }
      .noise-grid figcaption {
        margin-top: 0.5rem;
        color: var(--text-dim);
        font-size: 0.9rem;
      }
      .noise-grid figcaption b {
        color: var(--text);
      }
      /* 맨 아래 최종 결과(구름)는 빌딩 블록들을 합친 결과이므로
         격자가 아니라 한 칸으로 넓고 크게 보여준다 */
      .cloud-final {
        margin: 2rem 0 0;
      }
      .cloud-final canvas {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #000;
      }
    </style>
  </head>
  <body class="demo-page">
    <main class="container">
      <section>
        <h2>03. Cloud</h2>
        <p>
          구름을 만들기 위한 노이즈 빌딩 블록
        </p>
        <div class="noise-grid">
          <figure>
            <canvas id="gl-canvas0"></canvas>
            <figcaption>
              <b>FBM (Perlin)</b> — gradient noise를 7개 옥타브로 합성한 FBM(fractal Brownian motion)
            </figcaption>
          </figure>
          <figure>
            <canvas id="gl-canvas1"></canvas>
            <figcaption>
              <b>FBM (Perlin) 절댓값</b> — gradient noise를 3개 옥타브로 합성한 FBM의 절댓값
            </figcaption>
          </figure>
          <figure>
            <canvas id="gl-canvas2"></canvas>
            <figcaption>
              <b>Inverted Worley</b> — worley noise를 뒤집은 결과
            </figcaption>
          </figure>
          <figure>
            <canvas id="gl-canvas3"></canvas>
            <figcaption>
              <b>FBM (Worley)</b> — worley noise를 3개 옥타브로 합성한 FBM(fractal Brownian motion)
            </figcaption>
          </figure>
          <figure>
            <canvas id="gl-canvas4"></canvas>
            <figcaption>
              <b>Perlin-Worley</b> — Perlin-Worley noise
            </figcaption>
          </figure>
        </div>

        <h3>최종 결과 — Cloud</h3>
        <p>
          위 노이즈들을 합성한 최종 구름. Perlin FBM을 기본 밀도로 삼아 Worley FBM으로
          디테일을 깎아낸(remap) 뒤, 대비를 끌어올려 구름 형태를 뽑아낸다.
        </p>
        <figure class="cloud-final">
          <canvas id="gl-canvas-cloud" data-thumb></canvas>
        </figure>

        <a class="back-link" href="../../">← 포트폴리오로 돌아가기</a>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
    <script type="module" src="/src/theme.ts"></script>
  </body>
</html>
